behaviors:
  DotsPlayer:
    trainer_type: ppo
    max_steps: 1000000

    hyperparameters:
      learning_rate: 3.0e-4
      batch_size: 128
      buffer_size: 10240
      learning_rate_schedule: linear
      beta: 5.0e-3
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3

    network_settings:
      normalize: false
      hidden_units: 256
      num_layers: 2

    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0

    checkpoint_interval: 50000
    keep_checkpoints: 5